<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instant Portfolio Asset Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #090d16; color: #f1f5f9; padding: 40px; text-align: center; }
        h1 { color: #00B4D8; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #131c2e; border: 1px solid #1e293b; border-radius: 10px; padding: 20px; text-align: left; display: flex; flex-direction: column; justify-content: space-between; }
        .filename { font-family: monospace; font-weight: bold; color: #06D6A0; font-size: 1rem; margin: 5px 0; }
        .source { font-size: 0.8rem; color: #64748b; margin-bottom: 15px; }
        .btn { background: #00B4D8; color: #090d16; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
        .btn:hover { background: #06D6A0; }
        .download-all { background: #06D6A0; color: #090d16; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 40px; }
        .download-all:hover { background: #00B4D8; }
    </style>
</head>
<body>

    <h1>Somaliland Portfolio Asset Downloader</h1>
    <p>Place this HTML file in the same folder as your downloaded raw images to convert and rename them instantly.</p>

    <button class="download-all" onclick="downloadAll()">Download All 10 Renamed Portfolio Images</button>

    <div class="grid" id="downloader-grid"></div>

    <script>
        const filesMap = [
            { source: "10171.jpg", target: "jamal-profile.jpg" },
            { source: "10468.jpg", target: "classroom-lab.jpg" },
            { source: "10462.jpg", target: "student-database.jpg" },
            { source: "10466.jpg", target: "library-system.jpg" },
            { source: "10467.png", target: "school-portal.jpg" },
            { source: "10459.jpg", target: "educational-website.jpg" },
            { source: "10469.webp", target: "student-work-preview.jpg" },
            { source: "10465.png", target: "lesson-plans-preview.jpg" },
            { source: "10463.png", target: "curriculum-preview.jpg" },
            { source: "10458.jpg", target: "graphics-portfolio.jpg" },
            { source: "10464.jpg", target: "certificates-preview.jpg" }
        ];

        const grid = document.getElementById('downloader-grid');

        filesMap.forEach(file => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <div class="source">Source: Original ${file.source}</div>
                    <div class="filename">→ ${file.target}</div>
                </div>
                <button class="btn" onclick="triggerDownload('${file.source}', '${file.target}')">Convert & Save</button>
            `;
            grid.appendChild(card);
        });

        function triggerDownload(source, target) {
            const link = document.createElement('a');
            link.href = source;
            link.download = target;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadAll() {
            filesMap.forEach((file, index) => {
                setTimeout(() => {
                    triggerDownload(file.source, file.target);
                }, index * 400); // Small delay to prevent browser blockages
            });
        }
    </script>
</body>
</html>
