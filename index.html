<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Preview</title>
    <style>
        body { background: #090d16; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #131c2e; padding: 15px; border-radius: 10px; border: 1px solid #1e293b; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; background: #020617; }
        .error-msg { color: #ff4d4d; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Asset Verification</h1>
    <p>If an image is missing, ensure it is named correctly in <b>assets/images/</b></p>
    
    <div class="grid">
        <div class="card">
            <img src="assets/images/jamal-profile.jpg" alt="Profile">
            <p>jamal-profile.jpg</p>
        </div>
        <div class="card">
            <img src="assets/images/classroom-lab.jpg" alt="Lab">
            <p>classroom-lab.jpg</p>
        </div>
        <div class="card">
            <img src="assets/images/student-database.jpg" alt="Database">
            <p>student-database.jpg</p>
        </div>
        <div class="card">
            <img src="assets/images/school-portal.jpg" alt="Portal">
            <p>school-portal.jpg</p>
        </div>
    </div>

    <script>
        // Simple script to alert if images are still missing
        document.querySelectorAll('img').forEach(img => {
            img.onerror = function() {
                this.style.border = "2px solid red";
                let p = document.createElement('p');
                p.className = "error-msg";
                p.innerText = "File Not Found in assets/images/";
                this.parentNode.appendChild(p);
            };
        });
    </script>
</body>
</html>
