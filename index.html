<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearson Edexcel ICT Portfolio Asset Hub</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #090d16; color: #f1f5f9; padding: 20px; text-align: center; }
        h1 { color: #00B4D8; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #94a3b8; margin-top: 0; margin-bottom: 30px; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: #131c2e; border: 1px solid #1e293b; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; text-align: left; }
        .preview-box { width: 100%; height: 200px; background: #020617; margin-bottom: 12px; border-radius: 6px; overflow: hidden; position: relative; }
        .preview-box.profile-box { height: 320px; } 
        img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .tag { position: absolute; top: 8px; left: 8px; background: #06D6A0; color: #090d16; padding: 3px 8px; font-size: 0.7rem; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
        .filename { margin: 4px 0; font-size: 0.85rem; color: #00B4D8; font-family: monospace; word-break: break-all; font-weight: bold; }
        .desc { margin: 0 0 15px 0; font-size: 0.8rem; color: #94a3b8; line-height: 1.5; min-height: 45px; }
        .btn { background: #00B4D8; color: #090d16; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; margin-top: auto; font-size: 0.9rem; display: block; text-align: center; }
        .btn:hover { background: #06D6A0; }
        .profile-card { border: 2px solid #00B4D8; grid-column: 1 / -1; max-width: 360px; margin: 0 auto 30px auto; text-align: center;}
    </style>
</head>
<body>

    <h1>Pearson Edexcel ICT - Somaliland Portfolio Asset Hub</h1>
    <p class="subtitle">Your uploaded assets are compiled below using absolute file system references.</p>

    <!-- Professional Profile Portrait Card -->
    <div class="card profile-card">
        <div class="preview-box profile-box">
            <span class="tag" style="background: #00B4D8;">Official Profile Headshot</span>
            <img src="10171.jpg" style="object-position: center top;">
        </div>
        <div class="filename">jamal-profile.jpg</div>
        <div class="desc">Your official portrait mapped straight from your file request.</div>
    </div>

    <!-- Main Project Grid -->
    <div class="grid" id="main-grid"></div>

    <script>
        const assets = [
            { 
                name: "graphics-portfolio.jpg", 
                tag: "Digital Media Unit",
                desc: "A polished design booklet compilation highlighting editorial layout frameworks.",
                sourceFile: "10458.jpg",
                pos: "center center"
            },
            { 
                name: "educational-website.jpg", 
                tag: "Web Authoring Unit",
                desc: "A presentation collection showcasing modern landing page layouts for online school systems.",
                sourceFile: "10459.jpg",
                pos: "center center"
            },
            { 
                name: "student-database.jpg", 
                tag: "Relational Database Structure",
                desc: "Complete entity relational database diagram mapping out student tables and primary key logic structures.",
                sourceFile: "10462.jpg",
                pos: "center center"
            },
            { 
                name: "curriculum-preview.jpg", 
                tag: "Curriculum Map",
                desc: "The official textbook reference tracking syllabus deliverables for the International GCSE ICT course.",
                sourceFile: "10463.png",
                pos: "center top"
            },
            { 
                name: "certificates-preview.jpg", 
                tag: "Professional Qualifications",
                desc: "A comprehensive learning management platform log of syllabus items and teacher tools.",
                sourceFile: "10464.jpg",
                pos: "left top"
            },
            { 
                name: "lesson-plans-preview.jpg", 
                tag: "Lesson Plan Matrix",
                desc: "A structured, clean weekly teacher instruction layout tracking module activities.",
                sourceFile: "10465.png",
                pos: "center top"
            },
            { 
                name: "library-system.jpg", 
                tag: "System Interface Design",
                desc: "Data Flow Diagram layout representing backend logic interactions for administrative software applications.",
                sourceFile: "10466.jpg",
                pos: "center center"
            },
            { 
                name: "school-portal.jpg", 
                tag: "Web App Platform",
                desc: "The authentic online identity header featuring the school crest, banner accents, and portal paths.",
                sourceFile: "10467.png",
                pos: "left top"
            },
            { 
                name: "classroom-lab.jpg", 
                tag: "ICT Lab Environment",
                desc: "Real image from your active lab environment showing secondary school students operating desktop workstations.",
                sourceFile: "10468.jpg",
                pos: "center center"
            },
            { 
                name: "student-work-preview.jpg", 
                tag: "Active Code Assignments",
                desc: "Real-world infrastructure panel overview highlighting modern server connection matrix clusters.",
                sourceFile: "10469.webp",
                pos: "center center"
            }
        ];

        const grid = document.getElementById('main-grid');

        assets.forEach(asset => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="preview-box">
                    <span class="tag">${asset.tag}</span>
                    <img src="${asset.sourceFile}" style="object-position: ${asset.pos};" alt="[Error loading ${asset.sourceFile}]">
                </div>
                <div class="filename" style="color: #06D6A0;">→ Rename to: ${asset.name}</div>
                <div class="desc">${asset.desc}</div>
                <div style="font-size:0.75rem; color:#64748b; margin-top:auto; font-family:monospace; border-top:1px solid #1e293b; padding-top:6px;">
                    Current file: ${asset.sourceFile}
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
