<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Visibility Asset Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #090d16; color: #f1f5f9; padding: 40px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-top: 30px; }
        .card { background: #131c2e; border: 2px solid #1e293b; border-radius: 15px; padding: 15px; }
        .preview-box { width: 100%; height: 180px; background: #000; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden; }
        canvas { max-width: 100%; height: auto; border: 1px solid #334155; }
        .btn { background: #00B4D8; color: #090d16; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; }
        .btn:hover { background: #06D6A0; }
        h3 { margin: 10px 0; font-size: 0.9rem; letter-spacing: 1px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Portfolio Image Asset Preview</h1>
    <p>If the boxes below are not blank, click "Download" to save the file.</p>

    <div class="grid" id="main-grid"></div>

    <script>
        const assets = [
            { name: "jamal-profile.jpg", w: 500, h: 500, color: "#00B4D8", txtColor: "#090d16" },
            { name: "classroom-lab.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "school-portal.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "library-system.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "lesson-plans-preview.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "student-work-preview.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "certificates-preview.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "curriculum-preview.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "student-database.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "educational-website.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" },
            { name: "graphics-portfolio.jpg", w: 800, h: 500, color: "#1e293b", txtColor: "#ffffff" }
        ];

        const grid = document.getElementById('main-grid');

        assets.forEach(asset => {
            // Create Canvas
            const canvas = document.createElement('canvas');
            canvas.width = asset.w;
            canvas.height = asset.h;
            const ctx = canvas.getContext('2d');

            // Draw Background
            ctx.fillStyle = asset.color;
            ctx.fillRect(0, 0, asset.w, asset.h);

            // Draw Pattern/Border so it's not "Blank"
            ctx.strokeStyle = asset.txtColor;
            ctx.lineWidth = 20;
            ctx.strokeRect(0, 0, asset.w, asset.h);
            
            // Draw Large Label
            ctx.fillStyle = asset.txtColor;
            ctx.font = `bold ${asset.w / 10}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(asset.name.split('.')[0].toUpperCase(), asset.w / 2, asset.h / 2);

            // Create Card
            const dataUrl = canvas.toDataURL('image/jpeg');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="preview-box">
                    <img src="${dataUrl}" style="width:100%">
                </div>
                <h3>${asset.name}</h3>
                <a href="${dataUrl}" download="${asset.name}" class="btn">DOWNLOAD FILE</a>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
